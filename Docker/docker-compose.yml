services:
  # --- ส่วนของ AI Engine ---
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - ai-network
    # ถ้ามี GPU (NVIDIA) ให้เอาคอมเมนต์ออกด้านล่างนี้เพื่อให้ AI ทำงานเร็วขึ้น
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

  # --- ส่วนของตัวดึง Model (Helper) ---
  # ตัวนี้จะรันแค่แป๊บเดียวเพื่อสั่ง pull llama3 ลงเครื่อง แล้วก็จบงานไป
  ollama-puller:
    image: curlimages/curl:latest
    container_name: ollama-puller
    networks:
      - ai-network
    depends_on:
      - ollama
    entrypoint: [ "/bin/sh", "-c" ]
    command: |
      "sleep 5;
      curl -X POST http://ollama:11434/api/pull -d '{\"name\": \"llama3\"}';
      echo '✅ Llama 3 model pulled successfully';"

  # --- ส่วนของโปรแกรม Python ของคุณ ---
  app:
    build: .
    container_name: scg-ticket-app
    depends_on:
      - ollama
    env_file:
      - .env
    networks:
      - ai-network
    restart: always

networks:
  ai-network:
    driver: bridge

volumes:
  ollama_data: